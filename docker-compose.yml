services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-crm-pdv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "105050"
      POSTGRES_DB: erp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
